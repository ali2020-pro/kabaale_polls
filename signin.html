<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kabaale University</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div style="text-align:center; margin-bottom:30px;">
                <div class="logo-icon" style="margin:0 auto 16px auto; width:48px; height:48px; font-size:1.5rem;">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2 style="font-size:1.5rem; margin-bottom:8px;">Student Login</h2>
                <p style="color:var(--text-muted); font-size:0.9rem;">Sign in to access the voting portal.</p>
            </div>

            <div id="errorMsg"
                style="display:none; color: #ef4444; background: #FEF2F2; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; text-align: center; border:1px solid #FECACA;">
            </div>

            <form onsubmit="handleLogin(event)">
                <div style="margin-bottom:16px;">
                    <label style="display:block; font-size:0.9rem; font-weight:500; margin-bottom:6px;">Reg
                        Number</label>
                    <input type="text" id="regInput" class="auth-input" placeholder="e.g. 23/U/1000/EVE" required>
                </div>
                <div style="margin-bottom:24px;">
                    <label style="display:block; font-size:0.9rem; font-weight:500; margin-bottom:6px;">Password</label>
                    <input type="password" id="passInput" class="auth-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
            </form>

            <div style="margin-top:24px; font-size:0.85rem; color:var(--text-muted); text-align:center;">
                <p><strong>Demo:</strong> <span id="demo-reg">...</span> / password123</p>
            </div>
        </div>
    </div>

    <script src="js/db_config.js"></script>
    <script src="js/users_list.js"></script>
    <script src="js/mock_db.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const reg = document.getElementById('regInput').value;
            const pass = document.getElementById('passInput').value;
            if (!window.MockDB) return;
            const user = window.MockDB.login(reg, pass);
            if (user) {
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.innerText = "Invalid credentials.";
                err.style.display = 'block';
            }
        }
        window.onload = () => { if (window.MockDB) document.getElementById('demo-reg').innerText = window.MockDB.users[0].regNo; }
    </script>
</body>

</html>
