<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Kabaale University</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth_guard.js"></script>
    <script src="js/db_config.js"></script>
    <script src="js/users_list.js"></script>
    <script src="js/mock_db.js"></script>
</head>

<body style="background-color: #F8FAFC;">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="app-container">
            <div class="logo-container">
                <a href="index.html" style="display:flex; align-items:center; gap:12px;">
                    <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="logo-text">
                        <h1>Kabaale University</h1>
                    </div>
                </a>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <a href="index.html" class="btn btn-outline" style="font-size:0.9rem;"><i class="fa-solid fa-house"></i>
                    Home</a>
                <button onclick="logout()" class="btn btn-outline"
                    style="font-size:0.9rem; border-color:#EF4444; color:#EF4444;">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="app-container" style="padding: 40px 20px;">

        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px; max-width:1000px; margin:0 auto;">

            <!-- Sidebar / Card -->
            <div class="card" style="padding:30px; text-align:center; height:fit-content;">
                <div
                    style="width:120px; height:120px; background:#EFF6FF; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:var(--primary);">
                    <i class="fa-solid fa-user-graduate" style="font-size:3.5rem;"></i>
                </div>
                <h2 id="p-name" style="margin-bottom:8px; font-size:1.5rem;">Student Name</h2>
                <div id="p-reg"
                    style="background:#F1F5F9; display:inline-block; padding:4px 12px; border-radius:20px; color:var(--text-muted); font-family:monospace; font-weight:600;">
                    ...</div>

                <div style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px; text-align:left;">
                    <div style="margin-bottom:16px;">
                        <label
                            style="font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); font-weight:600;">Course</label>
                        <div id="p-school" style="font-weight:600; color:var(--text-main);">...</div>
                    </div>
                    <div>
                        <label
                            style="font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); font-weight:600;">Year
                            of Study</label>
                        <div id="p-year" style="font-weight:600; color:var(--text-main);">...</div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div>
                <!-- Status Banner -->
                <div class="card"
                    style="padding:24px; display:flex; align-items:center; gap:20px; margin-bottom:24px; border-left: 4px solid var(--primary);">
                    <div
                        style="width:50px; height:50px; background:#DBEAFE; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--primary);">
                        <i class="fa-solid fa-check-to-slot" style="font-size:1.5rem;"></i>
                    </div>
                    <div style="flex:1;">
                        <h4 style="margin-bottom:4px;">Ready to Vote?</h4>
                        <p style="color:var(--text-muted); font-size:0.95rem;">Review the candidates or check your
                            voting history.</p>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <a href="index.html#voting-section" class="btn btn-primary">Candidates</a>
                        <a href="dashboard.html" class="btn btn-outline">My History</a>
                    </div>
                </div>

                <!-- Stats Grid -->
                <h3 style="margin-bottom:16px; font-size:1.2rem;">Participation Overview</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                    <div class="card" style="padding:20px;">
                        <div style="font-size:2.5rem; font-weight:800; color:var(--primary); margin-bottom:4px;"
                            id="stat-casted">0</div>
                        <div style="font-size:0.9rem; color:var(--text-muted); font-weight:500;">Votes Cast</div>
                    </div>
                    <div class="card" style="padding:20px;">
                        <div style="font-size:2.5rem; font-weight:800; color:var(--success); margin-bottom:4px;"
                            id="stat-rate">0%</div>
                        <div style="font-size:0.9rem; color:var(--text-muted); font-weight:500;">Participation Rate
                        </div>
                    </div>
                    <div class="card" style="padding:20px;">
                        <div style="font-size:2.5rem; font-weight:800; color:var(--text-light); margin-bottom:4px;"
                            id="stat-missed">0</div>
                        <div style="font-size:0.9rem; color:var(--text-muted); font-weight:500;">Skipped</div>
                    </div>
                </div>

                <!-- Recent Activity Preview (Optional) -->
                <div style="margin-top:30px;">
                    <h3 style="margin-bottom:16px; font-size:1.2rem;">Account Status</h3>
                    <div class="card" style="padding:20px;">
                        <div
                            style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:12px;">
                            <span style="color:var(--text-muted);">Registration Status</span>
                            <span style="color:var(--success); font-weight:600;"><i
                                    class="fa-solid fa-check-circle"></i> Verified</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--text-muted);">Access Level</span>
                            <span style="font-weight:600;">Standard Voter</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user) {
                // Info
                document.getElementById('p-name').innerText = user.name;
                document.getElementById('p-reg').innerText = user.regNo;

                // Extra details from mock_db user object if available, otherwise from static list
                // user object in sessionStorage usually has everything if logged in via mock_db
                document.getElementById('p-school').innerText = user.school || "N/A";
                document.getElementById('p-year').innerText = user.year || "N/A";

                // Stats
                if (user.voteHistory && window.MockDB) {
                    const totalPositions = window.MockDB.positions.length;
                    const casted = Object.keys(user.voteHistory).length;
                    const missed = totalPositions - casted;
                    const rate = Math.round((casted / totalPositions) * 100);

                    document.getElementById('stat-casted').innerText = casted;
                    document.getElementById('stat-rate').innerText = rate + '%';
                    document.getElementById('stat-missed').innerText = missed;
                }
            }
        });
        function logout() { sessionStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>

</html>
